{% extends 'base_layout.html' %}

{% block title %}Login{% endblock %}

{% block content %}
	<main class="auth-page">
		<section class="auth-card" aria-labelledby="login-title">
			<div class="auth-heading">
				<span class="section-label">Accesso</span>
				<h1 id="login-title">Benvenuto</h1>
				<p>Accedi al portale gestione commesse.</p>
			</div>

			{% if form.errors %}
				<div class="auth-alert" role="alert">
					Credenziali non valide. Riprova.
				</div>
			{% endif %}

			<form method="post" class="auth-form" novalidate>
				{% csrf_token %}
				<input type="hidden" name="next" value="{{ safe_next }}">

				<label for="{{ form.username.id_for_label }}">Utente</label>
				{{ form.username }}

				<label for="{{ form.password.id_for_label }}">Password</label>
				{{ form.password }}

				<button type="submit" class="auth-submit">Accedi</button>
			</form>
		</section>
	</main>
{% endblock %}
